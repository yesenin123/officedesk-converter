<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 500" width="1024" height="500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FBF6EC"/>
      <stop offset="100%" stop-color="#EFE7D3"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFAF0"/>
      <stop offset="100%" stop-color="#F4ECD8"/>
    </linearGradient>
    <filter id="sh">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="3"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.22"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1024" height="500" fill="url(#bg)"/>

  <!-- скотч -->
  <rect x="-30" y="30" width="160" height="32" fill="#B8884A" opacity="0.6" transform="rotate(-3)"/>

  <!-- текст -->
  <g transform="translate(60, 130)">
    <text font-family="JetBrains Mono, monospace" font-size="14"
          fill="#8A5F2C" letter-spacing="4">OFFICEDESK · RU</text>
    <text y="70" font-family="Georgia, serif" font-size="42"
          font-weight="600" fill="#2A2724">Конвертер документов</text>
    <text y="120" font-family="Georgia, serif" font-size="22"
          fill="#55504a" font-style="italic">Word, PDF, EPUB и ещё 8 форматов.</text>
    <text y="150" font-family="Georgia, serif" font-size="22"
          fill="#55504a" font-style="italic">Работает офлайн.</text>
    <text y="220" font-family="JetBrains Mono, monospace" font-size="16"
          fill="#7A8A4A" letter-spacing="2">✓ ЛОКАЛЬНО   ✓ БЕСПЛАТНО   ✓ БЕЗ РЕКЛАМЫ</text>
  </g>

  <!-- бумажки -->
  <g transform="translate(690, 80) scale(0.75)" filter="url(#sh)">
    <g transform="translate(0, 30) rotate(-5)">
      <path d="M0,0 L130,0 L160,30 L160,220 L0,220 Z"
            fill="url(#paper)" stroke="#C8B896" stroke-width="2"/>
      <path d="M130,0 L130,30 L160,30 Z" fill="#E2D6BD"/>
      <rect x="0" y="194" width="160" height="26" fill="#1A4480"/>
      <text x="80" y="213" text-anchor="middle" font-family="JetBrains Mono, monospace"
            font-size="18" fill="white" font-weight="700">DOCX</text>
    </g>
    <g transform="translate(70, 180)">
      <circle cx="0" cy="0" r="28" fill="#2A2724"/>
      <path d="M-14,0 L14,0 M6,-9 L14,0 L6,9"
            stroke="white" stroke-width="3" fill="none"
            stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <g transform="translate(140, 30) rotate(4)">
      <path d="M0,0 L130,0 L160,30 L160,220 L0,220 Z"
            fill="url(#paper)" stroke="#C8B896" stroke-width="2"/>
      <path d="M130,0 L130,30 L160,30 Z" fill="#E2D6BD"/>
      <rect x="0" y="194" width="160" height="26" fill="#A8362B"/>
      <text x="80" y="213" text-anchor="middle" font-family="JetBrains Mono, monospace"
            font-size="18" fill="white" font-weight="700">PDF</text>
    </g>
  </g>
</svg>
