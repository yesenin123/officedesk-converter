<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FBF6EC"/>
      <stop offset="100%" stop-color="#EFE7D3"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFAF0"/>
      <stop offset="100%" stop-color="#F4ECD8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dx="0" dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1080" height="1920" fill="url(#bg)"/>

  <!-- штрих-сетка как из тетради -->
  <g opacity="0.12">
    <line x1="0" y1="120" x2="1080" y2="120" stroke="#8A5F2C" stroke-width="1"/>
    <line x1="0" y1="1800" x2="1080" y2="1800" stroke="#8A5F2C" stroke-width="1"/>
  </g>

  <!-- header -->
  <text x="540" y="200" text-anchor="middle" font-family="JetBrains Mono, monospace"
        font-size="28" fill="#8A5F2C" letter-spacing="6">OFFICEDESK · RU</text>

  <text x="540" y="350" text-anchor="middle" font-family="Georgia, serif"
        font-size="120" font-weight="600" fill="#2A2724">Конвертер</text>
  <text x="540" y="470" text-anchor="middle" font-family="Georgia, serif"
        font-size="78" fill="#2A2724">документов</text>

  <!-- decorative tape -->
  <rect x="380" y="540" width="320" height="50" fill="#B8884A" opacity="0.7" transform="rotate(-2 540 565)"/>
  <text x="540" y="575" text-anchor="middle" font-family="JetBrains Mono, monospace"
        font-size="26" fill="white" font-weight="700" letter-spacing="2"
        transform="rotate(-2 540 565)">11 ФОРМАТОВ</text>

  <!-- главное изображение: бумага со стрелкой DOCX -> PDF -->
  <g transform="translate(140, 700)" filter="url(#shadow)">
    <!-- DOCX -->
    <g transform="translate(0, 80)">
      <path d="M0,0 L260,0 L320,60 L320,400 L0,400 Z"
            fill="url(#paper)" stroke="#C8B896" stroke-width="2"/>
      <path d="M260,0 L260,60 L320,60 Z" fill="#E2D6BD"/>
      <rect x="0" y="350" width="320" height="50" fill="#1A4480"/>
      <text x="160" y="385" text-anchor="middle"
            font-family="JetBrains Mono, monospace"
            font-size="36" fill="white" font-weight="700">DOCX</text>
      <!-- линии текста -->
      <g opacity="0.25" stroke="#1A4480" stroke-width="3" stroke-linecap="round">
        <line x1="30" y1="100" x2="280" y2="100"/>
        <line x1="30" y1="140" x2="240" y2="140"/>
        <line x1="30" y1="180" x2="280" y2="180"/>
        <line x1="30" y1="220" x2="200" y2="220"/>
      </g>
    </g>

    <!-- стрелка -->
    <g transform="translate(360, 280)">
      <circle cx="50" cy="0" r="56" fill="#2A2724"/>
      <path d="M22,0 L78,0 M62,-18 L78,0 L62,18"
            stroke="white" stroke-width="6" fill="none"
            stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- PDF -->
    <g transform="translate(480, 80)">
      <path d="M0,0 L260,0 L320,60 L320,400 L0,400 Z"
            fill="url(#paper)" stroke="#C8B896" stroke-width="2"/>
      <path d="M260,0 L260,60 L320,60 Z" fill="#E2D6BD"/>
      <rect x="0" y="350" width="320" height="50" fill="#A8362B"/>
      <text x="160" y="385" text-anchor="middle"
            font-family="JetBrains Mono, monospace"
            font-size="36" fill="white" font-weight="700">PDF</text>
      <g opacity="0.25" stroke="#A8362B" stroke-width="3" stroke-linecap="round">
        <line x1="30" y1="100" x2="280" y2="100"/>
        <line x1="30" y1="140" x2="240" y2="140"/>
        <line x1="30" y1="180" x2="280" y2="180"/>
        <line x1="30" y1="220" x2="200" y2="220"/>
      </g>
      <!-- штамп ОДОБРЕНО -->
      <g transform="translate(220, 250) rotate(-12)">
        <circle r="50" fill="none" stroke="#A8362B" stroke-width="4" opacity="0.6"/>
        <text text-anchor="middle" y="-4"
              font-family="JetBrains Mono, monospace" font-size="14"
              fill="#A8362B" font-weight="700" opacity="0.7">ГОТОВО</text>
      </g>
    </g>
  </g>

  <!-- пункты -->
  <g transform="translate(140, 1340)">
    <g transform="translate(0, 0)">
      <circle cx="20" cy="20" r="20" fill="#7A8A4A"/>
      <path d="M10,20 L18,28 L30,12" stroke="white" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="60" y="29" font-family="Georgia, serif" font-size="38" fill="#2A2724">Word, PDF, EPUB, RTF, Excel</text>
    </g>
    <g transform="translate(0, 80)">
      <circle cx="20" cy="20" r="20" fill="#7A8A4A"/>
      <path d="M10,20 L18,28 L30,12" stroke="white" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="60" y="29" font-family="Georgia, serif" font-size="38" fill="#2A2724">Только локально — без сети</text>
    </g>
    <g transform="translate(0, 160)">
      <circle cx="20" cy="20" r="20" fill="#7A8A4A"/>
      <path d="M10,20 L18,28 L30,12" stroke="white" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="60" y="29" font-family="Georgia, serif" font-size="38" fill="#2A2724">Без рекламы и регистрации</text>
    </g>
    <g transform="translate(0, 240)">
      <circle cx="20" cy="20" r="20" fill="#7A8A4A"/>
      <path d="M10,20 L18,28 L30,12" stroke="white" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="60" y="29" font-family="Georgia, serif" font-size="38" fill="#2A2724">Всё бесплатно</text>
    </g>
  </g>

  <!-- CTA -->
  <g transform="translate(290, 1660)">
    <rect width="500" height="100" rx="10" fill="#2A2724"/>
    <text x="250" y="65" text-anchor="middle" font-family="Georgia, serif"
          font-size="42" fill="white" font-weight="600">Скачать в RuStore</text>
  </g>

  <!-- подпись -->
  <text x="540" y="1830" text-anchor="middle" font-family="JetBrains Mono, monospace"
        font-size="22" fill="#8A8175" letter-spacing="2">officedesk.ru · 0+</text>
</svg>
