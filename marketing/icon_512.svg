<?xml version="1.0" encoding="UTF-8"?>
<!-- Иконка приложения для RuStore: 512×512 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FBF6EC"/>
      <stop offset="100%" stop-color="#F0E8D6"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFAF0"/>
      <stop offset="100%" stop-color="#F4ECD8"/>
    </linearGradient>
    <filter id="sh">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="4"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <g filter="url(#sh)">
    <!-- лист бумаги -->
    <path d="M120,110 L320,110 L400,190 L400,420 L120,420 Z"
          fill="url(#paper)" stroke="#C8B896" stroke-width="3"/>
    <path d="M320,110 L320,190 L400,190 Z" fill="#E2D6BD"/>

    <!-- цветная полоса формата -->
    <rect x="120" y="376" width="280" height="44" fill="#8A5F2C"/>

    <!-- стрелка конвертации -->
    <g stroke="#2A2724" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="170" y1="270" x2="350" y2="270"/>
      <polyline points="320,236 354,270 320,304"/>
    </g>
  </g>
</svg>
